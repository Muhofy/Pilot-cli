# ─────────────────────────────────────────────────────────────
#  pilot — Auto-update Homebrew formula on release tag
#  Triggers on: v* tag push (after release.yml completes)
# ─────────────────────────────────────────────────────────────

name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    name: Update Formula
    runs-on: ubuntu-latest

    steps:
      - name: Get release version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Compute SHA256 for all binaries
        id: sha
        run: |
          BASE="https://github.com/muhofy/Pilot-cli/releases/download/${{ steps.version.outputs.tag }}"

          SHA_DARWIN_AMD64=$(curl -fsSL "${BASE}/pilot-darwin-amd64" | sha256sum | awk '{print $1}')
          SHA_DARWIN_ARM64=$(curl -fsSL "${BASE}/pilot-darwin-arm64" | sha256sum | awk '{print $1}')
          SHA_LINUX_AMD64=$(curl -fsSL  "${BASE}/pilot-linux-amd64"  | sha256sum | awk '{print $1}')
          SHA_LINUX_ARM64=$(curl -fsSL  "${BASE}/pilot-linux-arm64"  | sha256sum | awk '{print $1}')

          echo "darwin_amd64=$SHA_DARWIN_AMD64" >> $GITHUB_OUTPUT
          echo "darwin_arm64=$SHA_DARWIN_ARM64" >> $GITHUB_OUTPUT
          echo "linux_amd64=$SHA_LINUX_AMD64"   >> $GITHUB_OUTPUT
          echo "linux_arm64=$SHA_LINUX_ARM64"   >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: muhofy/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Strip leading 'v' for formula version field
          VERSION_NUM="${VERSION#v}"

          cat > homebrew-tap/Formula/pilot.rb << EOF
          class Pilot < Formula
            desc "Your terminal co-pilot — natural language to terminal commands"
            homepage "https://github.com/muhofy/Pilot-cli"
            version "${VERSION_NUM}"
            license "GPL-3.0-only"

            on_macos do
              on_intel do
                url "https://github.com/muhofy/Pilot-cli/releases/download/${VERSION}/pilot-darwin-amd64"
                sha256 "${{ steps.sha.outputs.darwin_amd64 }}"
              end

              on_arm do
                url "https://github.com/muhofy/Pilot-cli/releases/download/${VERSION}/pilot-darwin-arm64"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/muhofy/Pilot-cli/releases/download/${VERSION}/pilot-linux-amd64"
                sha256 "${{ steps.sha.outputs.linux_amd64 }}"
              end

              on_arm do
                url "https://github.com/muhofy/Pilot-cli/releases/download/${VERSION}/pilot-linux-arm64"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              end
            end

            def install
              bin.install Dir["pilot-*"].first => "pilot"
            end

            def caveats
              <<~EOS
                pilot requires an OpenRouter API key to work.

                Get a free key at: https://openrouter.ai/keys

                Then export it:
                  export OPENROUTER_API_KEY=your_key_here

                Or persist it:
                  echo 'export OPENROUTER_API_KEY=your_key' >> ~/.zshrc
              EOS
            end

            test do
              assert_match "pilot", shell_output("#{bin}/pilot --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pilot.rb
          git diff --staged --quiet || git commit -m "chore: update pilot formula to ${{ steps.version.outputs.tag }}"
          git push