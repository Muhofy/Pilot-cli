# ─────────────────────────────────────────────────────────────
#  pilot — CI/CD Pipeline
#
#  Triggers:
#    push → main/dev     : lint + build + test
#    push → v* tag       : lint + build + test + release + upload
#    pull_request → main : lint + build + test
# ─────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, dev]
    tags:     ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write  # required for release upload

# ── Shared env ───────────────────────────
env:
  APP: pilot
  GO_VERSION: "1.22"

# ═════════════════════════════════════════
#  JOB 1 — Lint & Vet
# ═════════════════════════════════════════
jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

  # ═════════════════════════════════════════
  #  JOB 2 — Test
  # ═════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

  # ═════════════════════════════════════════
  #  JOB 3 — Cross-platform Build
  # ═════════════════════════════════════════
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - os: linux   
            arch: amd64
            ext: ""
          - os: linux   
            arch: arm64
            ext: ""
          - os: darwin  
            arch: amd64
            ext: ""
          - os: darwin  
            arch: arm64
            ext: ""
          - os: windows 
            arch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          OUT="${{ env.APP }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "dist/${OUT}" \
            ./cmd/pilot/main.go
          echo "Built: dist/${OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 7

  # ═════════════════════════════════════════
  #  JOB 4 — Release (only on v* tags)
  # ═════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List binaries
        run: ls -lh dist/

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURR_TAG=${GITHUB_REF_NAME}

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${CURR_TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file (handles multiline)
          {
            echo "## What's Changed"
            echo ""
            echo "${LOG}"
            echo ""
            echo "## Installation"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/muhofy/pilot/main/install.sh | bash"
            echo '```'
          } > release_notes.md

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "pilot ${{ github.ref_name }}"
          body_path:  release_notes.md
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            dist/pilot-linux-amd64
            dist/pilot-linux-arm64
            dist/pilot-darwin-amd64
            dist/pilot-darwin-arm64
            dist/pilot-windows-amd64.exe
            install.sh